spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/trailhub
    username: trailhub
    password: trailhub
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080