services:
  postgres:
    image: postgres:16
    container_name: trailhub-postgres
    environment:
      POSTGRES_DB: trailhub
      POSTGRES_USER: trailhub
      POSTGRES_PASSWORD: trailhub
    ports:
      - "5433:5432"
    volumes:
      - trailhub_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trailhub -d trailhub"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  trailhub_pg_data: